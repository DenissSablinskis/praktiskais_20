name: Python CI pārbaude

on: [push]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.14.3'

      - name: Installet pytest
        run: |
          pip install pytest
      - name: Palaist testus
        run: python -m pytest
